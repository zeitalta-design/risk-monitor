name: "Fetch: Sanpai (産廃)"

# ============================================================
# 産廃許可取消一覧を取得する。
#   ソース1: 大阪府（Excel）
#   ソース2: 神奈川県（HTML テーブル）
#
# 旧 ingest-sanpai.mjs の Python/better-sqlite3 依存を排除し、
# Node.js/libsql 単独で動作。Vercel Hobby の制限内でも十分高速
# （実測1.7〜21秒）だが、GitHub Actions で統一運用。
#
# スケジュール: 毎日 JST 04:47
# 手動実行: workflow_dispatch で任意タイミング実行可
#
# 必要な GitHub Secrets:
#   TURSO_DATABASE_URL
#   TURSO_AUTH_TOKEN
# ============================================================

on:
  schedule:
    # 毎日 JST 04:47 = UTC 19:47 (前日)
    - cron: "47 19 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: fetch-sanpai
  cancel-in-progress: false

jobs:
  fetch:
    name: "産廃許可取消情報（大阪・神奈川）取得"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: "Info: 実行情報"
        run: |
          echo "Trigger:   ${{ github.event_name }}"
          echo "Actor:     ${{ github.actor }}"
          echo "Run ID:    ${{ github.run_id }}"
          echo "Time UTC:  $(date -u '+%Y-%m-%d %H:%M:%S')"

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: "Install dependencies"
        working-directory: web
        run: npm ci --prefer-offline --no-audit

      - name: "Run: fetch-sanpai"
        working-directory: web
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
        run: node scripts/fetch-sanpai.mjs

      - name: "Alert: 失敗時 Issue 作成"
        if: failure() && github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          TITLE="[Sanpai] 定期実行失敗 $(date -u '+%Y-%m-%d')"
          BODY=$(printf '%s\n' \
            "## 産廃許可取消情報取得の定期実行失敗" \
            "" \
            "| 項目 | 値 |" \
            "|------|----|" \
            "| Run | [詳細](${RUN_URL}) |" \
            "| Time (UTC) | $(date -u '+%Y-%m-%d %H:%M:%S') |" \
            "" \
            "### 確認事項" \
            "1. 大阪府 xlsx ファイル名の変更" \
            "2. 神奈川県 HTML テーブル構造の変更" \
            "3. Turso 接続情報")

          EXISTING=$(gh issue list --state open --search "in:title [Sanpai]" --limit 1 --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "ops" 2>/dev/null \
              || gh issue create --title "$TITLE" --body "$BODY"
          fi
