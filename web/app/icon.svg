<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#1A3F6B"/>
  <!-- コンパス外円 -->
  <circle cx="16" cy="16" r="11" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- コンパス内円 -->
  <circle cx="16" cy="16" r="2" fill="white"/>
  <!-- 北針（上向き） -->
  <polygon points="16,5.5 14,14 16,12.5 18,14" fill="#E8A838"/>
  <!-- 南針（下向き） -->
  <polygon points="16,26.5 18,18 16,19.5 14,18" fill="white" opacity="0.6"/>
  <!-- 東西の目盛り -->
  <line x1="5" y1="16" x2="7.5" y2="16" stroke="white" stroke-width="1" opacity="0.5"/>
  <line x1="24.5" y1="16" x2="27" y2="16" stroke="white" stroke-width="1" opacity="0.5"/>
</svg>
